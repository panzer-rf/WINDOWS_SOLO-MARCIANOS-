<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👾 SOLO MARCIANOS - Examen Windows 80 Preguntas 👾</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <header>
            <h1 class="glitch" data-text="👽 SOLO MARCIANOS 👽">👽 SOLO MARCIANOS 👽</h1>
            <p class="subtitle">Examen de Windows - 80 Preguntas Intergalácticas para SENATINOS</p>
            <div class="creator-badge">
                <span class="creator">🚀 Creado por:Urpe DEJAME BIEN MI NETO 🚀</span>
            </div>
        </header>

        <div class="stats-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="score-board" id="scoreBoard">
                <span class="score-label">PUNTUACIÓN:</span>
                <span class="score-value" id="scoreValue">0</span>
                <span class="score-max">/80</span>
            </div>
        </div>

        <div id="memeArea" class="meme-container">
            <div class="meme-wrapper">
                <img id="memeImage" src="https://media.giphy.com/media/l0MYEqEzwMWFCg8rm/giphy.gif" alt="Meme Espacial">
                <div class="meme-overlay"></div>
            </div>
            <div id="feedbackMessage" class="feedback-message">
                <span class="typing-effect">👾 ¡Bienvenido Terrícola (grupo ALFA PURO CHISTOSOS)! 👾</span>
            </div>
        </div>

        <div class="exam-container">
            <div class="exam-header">
                <h2>📋 EXAMEN DE CERTIFICACIÓN MARCIANO 📋</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Todas</button>
                    <button class="filter-btn" data-filter="answered">Respondidas</button>
                    <button class="filter-btn" data-filter="unanswered">Sin responder</button>
                </div>
            </div>

            <form id="examForm">
                <div id="questionsContainer" class="questions-grid"></div>

                <div class="action-buttons">
                    <button type="button" id="submitBtn" class="btn-primary">
                        <span>🚀 CORREGIR EXAMEN 🚀</span>
                    </button>
                    <button type="button" id="resetBtn" class="btn-secondary">
                        <span>🔄 REINICIAR 🔄</span>
                    </button>
                </div>
            </form>
        </div>

        <div id="resultModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">🎉 RESULTADO FINAL 🎉</h2>
                </div>
                <div class="modal-body">
                    <div class="result-gif" id="resultGif"></div>
                    <p id="modalMessage" class="modal-message"></p>
                    <div class="final-score">
                        <span class="big-score" id="finalScore">0</span>
                        <span class="score-text">PUNTOS</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-close" onclick="closeModal()">✨ CERRAR ✨</button>
                </div>
            </div>
        </div>
    </div>

    <script src="scrip.js"></script>
</body>
</html>
